<!DOCTYPE html>
<html>
<head>
    <title>Parent Login - PocketPilot AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #0f172a, #1e1b4b);
            font-family: Arial;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00e5ff;
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px #00e5ff;
            backdrop-filter: blur(10px);
        }

        h2 {
            color: #00e5ff;
            text-shadow: 0 0 10px #00e5ff;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid #00e5ff;
        }

        input:focus {
            box-shadow: 0 0 10px #00e5ff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00e5ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #00e5ff;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .error {
            color: #ff4d4d;
            margin-top: 10px;
            text-shadow: 0 0 10px red;
        }

        .back {
            margin-top: 15px;
            display: block;
            color: #a855f7;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>👨 Parent Login</h2>

    <form method="POST">

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <a href="/welcome" class="back">⬅ Back</a>

</div>

</body>
</html>
