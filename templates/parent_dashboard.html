<!DOCTYPE html>
<html>
<head>
    <title>Parent Dashboard - PocketPilot AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: radial-gradient(circle at top, #0f172a, #1e1b4b);
            color: white;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid #00e5ff;
            box-shadow: 0 0 10px #00e5ff;
        }

        .title {
            color: #00e5ff;
            font-size: 20px;
            text-shadow: 0 0 10px #00e5ff;
        }

        .logout a {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00e5ff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px #00e5ff;
        }

        .card h3 {
            margin: 0;
            color: #a855f7;
        }

        .section {
            margin-top: 20px;
        }

        table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        th {
            color: #00e5ff;
        }

        .badge {
            display: inline-block;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #39ff14;
            box-shadow: 0 0 10px #39ff14;
        }

    </style>
</head>

<body>

<div class="topbar">
    <div class="title">👨 Parent Dashboard</div>
    <div class="logout"><a href="/logout">Logout 🚪</a></div>
</div>

<div class="container">

    <!-- STATS CARDS -->
    <div class="cards">

        <div class="card">
            <h3>💰 Allowance</h3>
            <h2>₹ {{ data.allowance }}</h2>
        </div>

        <div class="card">
            <h3>📉 Spent</h3>
            <h2>₹ {{ data.spent }}</h2>
        </div>

        <div class="card">
            <h3>💵 Remaining</h3>
            <h2>₹ {{ data.remaining }}</h2>
        </div>

    </div>

    <!-- TRANSACTIONS -->
    <div class="section">
        <h2>📑 Transactions</h2>

        <table>
            <tr>
                <th>Category</th>
                <th>Amount</th>
            </tr>

            {% for t in data.transactions %}
            <tr>
                <td>{{ t.cat }}</td>
                <td>₹ {{ t.amt }}</td>
            </tr>
            {% endfor %}

        </table>
    </div>

    <!-- BADGES -->
    <div class="section">
        <h2>🏆 Badges</h2>

        {% for b in data.badges %}
            <div class="badge">{{ b }}</div>
        {% endfor %}
    </div>

</div>

</body>
</html>
